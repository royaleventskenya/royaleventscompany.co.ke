<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery - Royal Events Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/css/lightbox.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FAF9F6;
      font-family: 'Poppins', sans-serif;
      color: #333;
    }

    nav {
      background: #FFD700;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links li a:hover {
      color: #cfa100;
    }

    .menu-toggle {
      display: none;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      background: none;
      border: none;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
        flex-direction: column;
        background-color: #FFD700;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        padding: 1rem 2rem;
      }

      .nav-links.active {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }
    }

    .gallery-hero {
      background: linear-gradient(135deg, #3D0066, #D4AF37);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .gallery-hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .gallery-container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: scale(1.05);
    }

    .gallery-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    footer {
      background-color: #1F1F1F;
      color: #D4AF37;
      text-align: center;
      padding: 20px;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Royal Events</div>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="gallery-hero">
    <h1>Our Gallery</h1>
    <p>Browse our amazing event collections</p>
  </section>

  <div class="gallery-container">
    <div class="gallery-grid">
      <div class="gallery-item">
        <a href="images/event1.jpg" data-lightbox="gallery">
          <img src="images/event1.jpg" alt="Event 1">
        </a>
      </div>
      <div class="gallery-item">
        <a href="images/event2.jpg" data-lightbox="gallery">
          <img src="images/event2.jpg" alt="Event 2">
        </a>
      </div>
      <div class="gallery-item">
        <a href="images/event3.jpg" data-lightbox="gallery">
          <img src="images/event3.jpg" alt="Event 3">
        </a>
      </div>
      <div class="gallery-item">
        <a href="images/event4.jpg" data-lightbox="gallery">
          <img src="images/event4.jpg" alt="Event 4">
        </a>
      </div>
      <div class="gallery-item">
        <a href="images/event5.jpg" data-lightbox="gallery">
          <img src="images/event5.jpg" alt="Event 5">
        </a>
      </div>
      <div class="gallery-item">
        <a href="images/event6.jpg" data-lightbox="gallery">
          <img src="images/event6.jpg" alt="Event 6">
        </a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Royal Events Kenya. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/lightbox2@2.11.4/dist/js/lightbox.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const menuToggle = document.querySelector('.menu-toggle');
      const navLinks = document.querySelector('.nav-links');

      menuToggle.addEventListener('click', () => {
        navLinks.classList.toggle('active');
      });

      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('active');
        });
      });
    });
  </script>
</body>
</html>
